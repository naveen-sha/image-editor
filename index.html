<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Image Editor</title>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="left">
                <div class="top">
                   <label for="image-input" class="btn">
                    Choose image
                    <input type="file" id="image-input" accept="image/*" hidden>
                   </label>
                   <button class="btn" id="reset-btn">Reset</button>
                   <button class="btn" id="download-btn">Download</button>
                </div>
                <div class="bottom">
                    <div class="placeholder">
                       <i class="ri-image-fill"></i>
                       <p>No image selected</p>
                    </div>
                </div>
            </div>
            <div class="right">
                <h2>Filters</h2>
                <div class="filters">
                    <div class="filter">
                        <p>Brightness</p>
                        <p>%</p>
                        <input name="brightness" type="range" min="0" max="200" value="100">
                        <p>Contrast</p>
                        <p>%</p>
                        <input name="contrast" type="range" min="0" max="200" value="100">
                        <p>Saturation</p>
                        <p>%</p>
                        <input name="saturation" type="range" min="0" max="200" value="100">
                        <p>Grayscale</p>
                        <p>%</p>
                        <input name="grayscale" type="range" min="0" max="100" value="0">
                        <p>Hue Rotation</p>
                        <p>deg</p>
                        <input name="hueRotation" type="range" min="0" max="360" value="0">
                    </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="editor.js"></script>
</body>
</html>
